<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Table</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

     const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadBillingData() {
    const { data: userData, error: userError } = await supabaseClient.auth.getUser();

    if (userError || !userData.user) {
      window.location.href = "login.html";
      return;
    }

    const loggedInUser = userData.user;

    const { data: appUser, error: appUserError } = await supabaseClient
      .from("app_users")
      .select("role, team_id")
      .eq("user_id", loggedInUser.id)
      .single();

    if (appUserError) {
      console.log("Error loading app user:", appUserError.message);
      return;
    }

    let query = supabaseClient
      .from("billing_data")
      .select("*")
      .order("id", { ascending: true });

    if (appUser.role === "member") {
      query = query.eq("team_id", appUser.team_id);
    }

    const { data, error } = await query;

    if (error) {
      console.log("Error loading billing data:", error.message);
      return;
    }

    const tableBody = document.getElementById("billing-table-body");
    tableBody.innerHTML = "";

    data.forEach((row) => {
      const tr = document.createElement("tr");

      tr.id = `billing-row-${row.id}`;
      tr.innerHTML = `
        <td>${row.id ?? ""}</td>
        <td>${row.cost_center ?? ""}</td>
        <td>${row.person_authorised ?? ""}</td>
        <td>${row.voucher_type ?? ""}</td>
        <td>${row.income_head ?? ""}</td>
        <td>${row.group_name ?? ""}</td>
        <td>${row.client ?? ""}</td>
        <td>${row.state ?? ""}</td>
        <td>${row.gstin ?? ""}</td>
        <td>${row.poc_name ?? ""}</td>
        <td>${row.poc_mobile ?? ""}</td>
        <td>${row.poc_email ?? ""}</td>
        <td>${row.description ?? ""}</td>
        <td>${row.amount ?? ""}</td>
        <td>${row.cgst ?? ""}</td>
        <td>${row.sgst ?? ""}</td>
        <td>${row.igst ?? ""}</td>
        <td>${row.total ?? ""}</td>
        <td>${row.billing_status ?? ""}</td>
        <td>${row.memo_no ?? ""}</td>
        <td>${row.memo_date ?? ""}</td>
        <td>${row.invoice_no ?? ""}</td>
        <td>${row.invoice_date ?? ""}</td>
        <td>${row.receiving_status ?? ""}</td>
        <td>${row.remarks ?? ""}</td>
        <td><button type="button" onclick="editBillingRow(${row.id})">Edit</button></td>
      `;
      tableBody.appendChild(tr);
    });
    
      highlightRowFromUrl();
  }

  async function logoutUser() {
    const { error } = await supabaseClient.auth.signOut();

    if (error) {
      alert("Logout failed: " + error.message);
      return;
    }

    window.location.href = "login.html";
  }



function editBillingRow(rowId) {
  const rowElement = document.getElementById(`billing-row-${rowId}`);

  if (!rowElement) {
    alert("Row not found.");
    return;
  }

  const cells = rowElement.querySelectorAll("td");

  document.getElementById("editing_row_id").value = rowId;
  document.getElementById("person_authorised").value = cells[2]?.textContent ?? "";
  document.getElementById("voucher_type").value = cells[3]?.textContent ?? "";
  document.getElementById("income_head").value = cells[4]?.textContent ?? "";
  document.getElementById("client").value = cells[6]?.textContent ?? "";
  document.getElementById("description").value = cells[12]?.textContent ?? "";
  document.getElementById("amount").value = cells[13]?.textContent ?? "";

  document.getElementById("form-title").textContent = "Edit Billing Entry";
  document.getElementById("save-button").textContent = "Update Entry";
  document.getElementById("cancel-edit-button").style.display = "inline-block";

  document.getElementById("billing-modal").style.display = "block";
}


  function resetBillingForm() {
  document.getElementById("editing_row_id").value = "";
  document.getElementById("person_authorised").value = "";
  document.getElementById("voucher_type").value = "";
  document.getElementById("income_head").value = "";
  document.getElementById("client").value = "";
  document.getElementById("description").value = "";
  document.getElementById("amount").value = "";

  document.getElementById("form-title").textContent = "Add Billing Entry";
  document.getElementById("save-button").textContent = "Add Entry";
  document.getElementById("cancel-edit-button").style.display = "none";
}

function openBillingModalForAdd() {
  resetBillingForm();
  document.getElementById("billing-modal").style.display = "block";
}

function closeBillingModal() {
  document.getElementById("billing-modal").style.display = "none";
}
  function highlightRowFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const rowId = params.get("row_id");

  if (!rowId) {
    return;
  }

  setTimeout(() => {
    const rowElement = document.getElementById(`billing-row-${rowId}`);

    if (rowElement) {
      rowElement.scrollIntoView({ behavior: "smooth", block: "center" });
      rowElement.style.backgroundColor = "#fff3cd";
      rowElement.style.outline = "2px solid #f0ad4e";
    } else {
      console.log("Row not found:", rowId);
    }
  }, 300);
}
    
  async function addBillingEntry() {
    console.log("Add Entry button clicked");

    const { data: userData, error: userError } = await supabaseClient.auth.getUser();

    if (userError || !userData.user) {
      alert("You must be logged in.");
      window.location.href = "login.html";
      return;
    }

    const loggedInUser = userData.user;

    const { data: appUser, error: appUserError } = await supabaseClient
      .from("app_users")
      .select("role, team_id")
      .eq("user_id", loggedInUser.id)
      .single();

    if (appUserError) {
      alert("Could not load app user.");
      console.log(appUserError);
      return;
    }

    const { data: teamData, error: teamError } = await supabaseClient
      .from("teams")
      .select("team_name")
      .eq("id", appUser.team_id)
      .single();

    if (teamError) {
      alert("Could not load team name.");
      console.log(teamError);
      return;
    }

    const personAuthorised = document.getElementById("person_authorised").value;
    const voucherType = document.getElementById("voucher_type").value;
    const incomeHead = document.getElementById("income_head").value;
    const client = document.getElementById("client").value;
    const description = document.getElementById("description").value;
    const amount = document.getElementById("amount").value;

   const { data: insertedRows, error: insertError } = await supabaseClient
  .from("billing_data")
  .insert([
    {
      team_id: appUser.team_id,
      cost_center: teamData.team_name,
      person_authorised: personAuthorised,
      voucher_type: voucherType,
      income_head: incomeHead,
      client: client,
      description: description,
      amount: amount ? Number(amount) : null
    }
  ])
  .select();

if (insertError) {
  alert("Insert failed: " + insertError.message);
  console.log(insertError);
  return;
}

const insertedRow = insertedRows[0];

const { error: logError } = await supabaseClient
  .from("audit_logs")
  .insert([
    {
      user_id: loggedInUser.id,
      user_email: loggedInUser.email,
      action: "insert",
      table_name: "billing_data",
      row_id: insertedRow.id,
      old_data: null,
      new_data: insertedRow
    }
  ]);
    
if (logError) {
  console.log("Audit log insert failed:", logError.message);
}
    alert("Entry added successfully");

    document.getElementById("person_authorised").value = "";
    document.getElementById("voucher_type").value = "";
    document.getElementById("income_head").value = "";
    document.getElementById("client").value = "";
    document.getElementById("description").value = "";
    document.getElementById("amount").value = "";

    loadBillingData();
  }

  window.onload = loadBillingData;
</script>

    th,

th:first-child,
td:first-child {

}
    button {
      padding: 10px 16px;

    .modal {

.modal-content {

}

.close-button {
  position: absolute;

  </style>
</head>

  <button onclick="logoutUser()">Logout</button>
  <button type="button" onclick="window.location.href='logs.html'">View Logs</button>
  <button type="button" id="save-button" onclick="addBillingEntry()">Add Entry</button>
