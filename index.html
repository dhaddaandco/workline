<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Table</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

     const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadBillingData() {
    const { data: userData, error: userError } = await supabaseClient.auth.getUser();

    if (userError || !userData.user) {
      window.location.href = "login.html";
      return;
    }

    const loggedInUser = userData.user;

    const { data: appUser, error: appUserError } = await supabaseClient
      .from("app_users")
      .select("role, team_id")
      .eq("user_id", loggedInUser.id)
      .single();

    if (appUserError) {
      console.log("Error loading app user:", appUserError.message);
      return;
    }

    let query = supabaseClient
      .from("billing_data")
      .select("*")
      .order("id", { ascending: true });

    if (appUser.role === "member") {
      query = query.eq("team_id", appUser.team_id);
    }

    const { data, error } = await query;

    if (error) {
      console.log("Error loading billing data:", error.message);
      return;
    }

    const tableBody = document.getElementById("billing-table-body");
    tableBody.innerHTML = "";

    data.forEach((row) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.cost_center ?? ""}</td>
        <td>${row.person_authorised ?? ""}</td>
        <td>${row.voucher_type ?? ""}</td>
        <td>${row.income_head ?? ""}</td>
        <td>${row.group_name ?? ""}</td>
        <td>${row.client ?? ""}</td>
        <td>${row.state ?? ""}</td>
        <td>${row.gstin ?? ""}</td>
        <td>${row.poc_name ?? ""}</td>
        <td>${row.poc_mobile ?? ""}</td>
        <td>${row.poc_email ?? ""}</td>
        <td>${row.description ?? ""}</td>
        <td>${row.amount ?? ""}</td>
        <td>${row.cgst ?? ""}</td>
        <td>${row.sgst ?? ""}</td>
        <td>${row.igst ?? ""}</td>
        <td>${row.total ?? ""}</td>
        <td>${row.billing_status ?? ""}</td>
        <td>${row.memo_no ?? ""}</td>
        <td>${row.memo_date ?? ""}</td>
        <td>${row.invoice_no ?? ""}</td>
        <td>${row.invoice_date ?? ""}</td>
        <td>${row.receiving_status ?? ""}</td>
        <td>${row.remarks ?? ""}</td>
      `;

      tableBody.appendChild(tr);
    });
  }

  loadBillingData();
</script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      overflow-x: auto;
      display: block;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #f4f4f4;
      position: sticky;
      top: 0;
    }
  </style>
</head>
<body>
  <h2>Billing Details</h2>

  <table>
    <thead>
      <tr>
        <th>Cost Center</th>
        <th>Person Authorised</th>
        <th>Voucher Type</th>
        <th>Income Head</th>
        <th>Group</th>
        <th>Client</th>
        <th>State</th>
        <th>GSTIN</th>
        <th>POC Name</th>
        <th>POC Mobile</th>
        <th>POC Email</th>
        <th>Description</th>
        <th>Amount</th>
        <th>CGST</th>
        <th>SGST</th>
        <th>IGST</th>
        <th>Total</th>
        <th>Billing Status</th>
        <th>Memo No.</th>
        <th>Memo Date</th>
        <th>Invoice No.</th>
        <th>Invoice Date</th>
        <th>Receiving Status</th>
        <th>Remarks</th>
      </tr>
    </thead>
    <tbody id="billing-table-body"></tbody>  </table>
</body>
</html>
