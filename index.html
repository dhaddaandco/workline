<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing Table</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

     const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  async function loadBillingData() {
    const { data: userData, error: userError } = await supabaseClient.auth.getUser();

    if (userError || !userData.user) {
      window.location.href = "login.html";
      return;
    }

    const loggedInUser = userData.user;

    const { data: appUser, error: appUserError } = await supabaseClient
      .from("app_users")
      .select("role, team_id")
      .eq("user_id", loggedInUser.id)
      .single();

    if (appUserError) {
      console.log("Error loading app user:", appUserError.message);
      return;
    }

    let query = supabaseClient
      .from("billing_data")
      .select("*")
      .order("id", { ascending: true });

    if (appUser.role === "member") {
      query = query.eq("team_id", appUser.team_id);
    }

    const { data, error } = await query;

    if (error) {
      console.log("Error loading billing data:", error.message);
      return;
    }

    const tableBody = document.getElementById("billing-table-body");
    tableBody.innerHTML = "";

    data.forEach((row) => {
      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td>${row.cost_center ?? ""}</td>
        <td>${row.person_authorised ?? ""}</td>
        <td>${row.voucher_type ?? ""}</td>
        <td>${row.income_head ?? ""}</td>
        <td>${row.group_name ?? ""}</td>
        <td>${row.client ?? ""}</td>
        <td>${row.state ?? ""}</td>
        <td>${row.gstin ?? ""}</td>
        <td>${row.poc_name ?? ""}</td>
        <td>${row.poc_mobile ?? ""}</td>
        <td>${row.poc_email ?? ""}</td>
        <td>${row.description ?? ""}</td>
        <td>${row.amount ?? ""}</td>
        <td>${row.cgst ?? ""}</td>
        <td>${row.sgst ?? ""}</td>
        <td>${row.igst ?? ""}</td>
        <td>${row.total ?? ""}</td>
        <td>${row.billing_status ?? ""}</td>
        <td>${row.memo_no ?? ""}</td>
        <td>${row.memo_date ?? ""}</td>
        <td>${row.invoice_no ?? ""}</td>
        <td>${row.invoice_date ?? ""}</td>
        <td>${row.receiving_status ?? ""}</td>
        <td>${row.remarks ?? ""}</td>
        <td><button type="button" onclick="editBillingRow(${row.id})">Edit</button></td>
      `;

      tableBody.appendChild(tr);
    });
  }

  async function logoutUser() {
    const { error } = await supabaseClient.auth.signOut();

    if (error) {
      alert("Logout failed: " + error.message);
      return;
    }

    window.location.href = "login.html";
  }


function editBillingRow(rowId) {
  alert("Edit clicked for row ID: " + rowId);
}
    
  async function addBillingEntry() {
    console.log("Add Entry button clicked");

    const { data: userData, error: userError } = await supabaseClient.auth.getUser();

    if (userError || !userData.user) {
      alert("You must be logged in.");
      window.location.href = "login.html";
      return;
    }

    const loggedInUser = userData.user;

    const { data: appUser, error: appUserError } = await supabaseClient
      .from("app_users")
      .select("role, team_id")
      .eq("user_id", loggedInUser.id)
      .single();

    if (appUserError) {
      alert("Could not load app user.");
      console.log(appUserError);
      return;
    }

    const { data: teamData, error: teamError } = await supabaseClient
      .from("teams")
      .select("team_name")
      .eq("id", appUser.team_id)
      .single();

    if (teamError) {
      alert("Could not load team name.");
      console.log(teamError);
      return;
    }

    const personAuthorised = document.getElementById("person_authorised").value;
    const voucherType = document.getElementById("voucher_type").value;
    const incomeHead = document.getElementById("income_head").value;
    const client = document.getElementById("client").value;
    const description = document.getElementById("description").value;
    const amount = document.getElementById("amount").value;

   const { data: insertedRows, error: insertError } = await supabaseClient
  .from("billing_data")
  .insert([
    {
      team_id: appUser.team_id,
      cost_center: teamData.team_name,
      person_authorised: personAuthorised,
      voucher_type: voucherType,
      income_head: incomeHead,
      client: client,
      description: description,
      amount: amount ? Number(amount) : null
    }
  ])
  .select();

if (insertError) {
  alert("Insert failed: " + insertError.message);
  console.log(insertError);
  return;
}

const insertedRow = insertedRows[0];

const { error: logError } = await supabaseClient
  .from("audit_logs")
  .insert([
    {
      user_id: loggedInUser.id,
      action: "insert",
      table_name: "billing_data",
      row_id: insertedRow.id,
      old_data: null,
      new_data: insertedRow
    }
  ]);

if (logError) {
  console.log("Audit log insert failed:", logError.message);
}
    alert("Entry added successfully");

    document.getElementById("person_authorised").value = "";
    document.getElementById("voucher_type").value = "";
    document.getElementById("income_head").value = "";
    document.getElementById("client").value = "";
    document.getElementById("description").value = "";
    document.getElementById("amount").value = "";

    loadBillingData();
  }

  window.onload = loadBillingData;
</script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      overflow-x: auto;
      display: block;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    th {
  background-color: #f4f4f4;
  position: sticky;
  top: 0;
}

th:first-child,
td:first-child {
  min-width: 70px;
  white-space: nowrap;
}
    button {
      padding: 10px 16px;
      margin-bottom: 15px;
      cursor: pointer;
    }
    .entry-form {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

.entry-form input,
.entry-form button {
  padding: 10px;
  font-size: 14px;
}
  </style>
</head>
<body>
  <button onclick="logoutUser()">Logout</button>

  <h2>Billing Details</h2>
  <h3>Add Billing Entry</h3>

<div class="entry-form">
  <input type="text" id="person_authorised" placeholder="Person Authorised" />
  <input type="text" id="voucher_type" placeholder="Voucher Type" />
  <input type="text" id="income_head" placeholder="Income Head" />
  <input type="text" id="client" placeholder="Client" />
  <input type="text" id="description" placeholder="Description" />
  <input type="number" id="amount" placeholder="Amount" />
  <button type="button" onclick="addBillingEntry()">Add Entry</button>
</div>

  <table>
    <thead>
      <tr>
        <th>Cost Center</th>
        <th>Person Authorised</th>
        <th>Voucher Type</th>
        <th>Income Head</th>
        <th>Group</th>
        <th>Client</th>
        <th>State</th>
        <th>GSTIN</th>
        <th>POC Name</th>
        <th>POC Mobile</th>
        <th>POC Email</th>
        <th>Description</th>
        <th>Amount</th>
        <th>CGST</th>
        <th>SGST</th>
        <th>IGST</th>
        <th>Total</th>
        <th>Billing Status</th>
        <th>Memo No.</th>
        <th>Memo Date</th>
        <th>Invoice No.</th>
        <th>Invoice Date</th>
        <th>Receiving Status</th>
        <th>Remarks</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="billing-table-body"></tbody>
  </table>
</body>
</html>
