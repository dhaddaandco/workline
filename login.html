<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      background: white;
      padding: 24px;
      border-radius: 8px;
      width: 320px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    h2 {
      margin-top: 0;
      text-align: center;
    }

    input,
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      box-sizing: border-box;
    }

    button {
      background-color: #333;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #555;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Login</h2>

    <input type="email" id="email" placeholder="Enter email" />
    <input type="password" id="password" placeholder="Enter password" />

    <button onclick="loginUser()">Login</button>
  </div>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loginUser() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email: email,
        password: password
      });

      if (error) {
        alert("Login failed: " + error.message);
        console.log(error);
        return;
      }

      const user = data.user;

      const { data: appUser, error: appUserError } = await supabaseClient
        .from("app_users")
        .select("role, team_id")
        .eq("user_id", user.id)
        .single();

      if (appUserError) {
        alert("Could not fetch role: " + appUserError.message);
        console.log(appUserError);
        return;
      }

      if (appUser.role === "admin") {
      window.location.href = "index.html";
    } else if (appUser.role === "partner") {
      window.location.href = "index.html";
    } else if (appUser.role === "member") {
      window.location.href = "index.html";
    } else {
      alert("Unknown role");
    }
  </script>
</body>
</html>
