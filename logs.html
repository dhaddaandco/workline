<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Logs</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background-color: #f4f4f4;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
    }

    button {
      padding: 10px 16px;
      margin-bottom: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <button onclick="window.location.href='index.html'">Back to Billing</button>

  <h2>Audit Logs</h2>

  <table>
    <thead>
      <tr>
  <th>ID</th>
  <th>Email</th>
  <th>Action</th>
  <th>Changes</th>
  <th>Created At</th>
</tr>    </thead>
    <tbody id="logs-table-body"></tbody>
  </table>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadLogs() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();

      if (userError || !userData.user) {
        window.location.href = "login.html";
        return;
      }

      const { data, error } = await supabaseClient
        .from("audit_logs")
        .select("*")
        .order("id", { ascending: false });
      const { data: appUsersData, error: appUsersError } = await supabaseClient
  .from("app_users")
  .select("user_id, email");
if (appUsersError) {
  console.log("Error loading app_users:", appUsersError.message);
  return;
}

const appUsersEmailMap = {};
appUsersData.forEach((user) => {
  appUsersEmailMap[user.user_id] = user.email;
});
      if (error) {
        console.log("Error loading logs:", error.message);
        return;
      }

      const tableBody = document.getElementById("logs-table-body");
      tableBody.innerHTML = "";

      data.forEach((row) => {
        const tr = document.createElement("tr");

        tr.innerHTML = `
  <td><a href="index.html?row_id=${row.row_id}">${row.row_id ?? ""}</a></td>
  <td>${getDisplayEmail(row, appUsersEmailMap)}</td>
  <td>${row.action ?? ""}</td>
  <td>${formatChanges(row.old_data, row.new_data, row.action)}</td>
  <td>${row.created_at ?? ""}</td>
`;
        tableBody.appendChild(tr);
      });
    }

    function getDisplayEmail(row, appUsersEmailMap) {
  const currentEmail = appUsersEmailMap[row.user_id];
  if (currentEmail) return currentEmail;

  if (row.table_name === "app_users") {
    if (row.new_data && row.new_data.email) return row.new_data.email;
    if (row.old_data && row.old_data.email) return row.old_data.email;
  }

  return row.user_email ?? row.user_id ?? "";
}
  function formatChanges(oldData, newData, action) {
  if (action === "insert") {
    return "New row created";
  }

  if (action === "delete" && oldData) {
    return Object.entries(oldData)
      .map(([key, value]) => `${key}: ${value ?? ""}`)
      .join("<br>");
  }

  if (action === "update" && oldData && newData) {
    return Object.keys(newData)
      .filter((key) => String(oldData[key] ?? "") !== String(newData[key] ?? ""))
      .map((key) => `${key}: ${oldData[key] ?? ""} → ${newData[key] ?? ""}`)
      .join("<br>");
  }

  return "";
}
 
    loadLogs();
  </script>
</body>
</html>
