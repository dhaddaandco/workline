<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
    let selectedUserEmail = null;

function selectUserRow(email, rowElement) {
  selectedUserEmail = email;

  document.querySelectorAll("#users-table-body tr").forEach((tr) => {
    tr.classList.remove("selected-user-row");
  });

  rowElement.classList.add("selected-user-row");

  document.getElementById("edit-user-button").disabled = false;
  document.getElementById("deactivate-user-button").disabled = false;
}

function openAddUserModal() {
  alert("Next step: Add User modal");
}

function openEditUserModal() {
  if (!selectedUserEmail) {
    alert("Please select a user first.");
    return;
  }

  alert("Next step: Edit user " + selectedUserEmail);
}

function deactivateSelectedUser() {
  if (!selectedUserEmail) {
    alert("Please select a user first.");
    return;
  }

  alert("Next step: Deactivate user " + selectedUserEmail);
}
  </script>

  <style>
    #users-table-body tr {
  cursor: pointer;
}
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #f4f4f4;
    }

    .status-active {
      color: green;
      font-weight: bold;
    }

    .status-inactive {
      color: #b42318;
      font-weight: bold;
    }
    .users-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.selected-user-row {
  background-color: #fff3cd;
}
  </style>
</head>
<body>
  <div class="top-bar">
    <button onclick="window.location.href='index.html'">Back to Billing</button>
  </div>

  <h2>Users</h2>
  <div class="users-actions">
  <button type="button" onclick="openAddUserModal()">Add User</button>
  <button type="button" id="edit-user-button" onclick="openEditUserModal()" disabled>Edit Selected</button>
  <button type="button" id="deactivate-user-button" onclick="deactivateSelectedUser()" disabled>Deactivate Selected</button>
</div>

  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Team</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="users-table-body"></tbody>
  </table>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadUsersPage() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();

      if (userError || !userData.user) {
        window.location.href = "login.html";
        return;
      }

      const loggedInUser = userData.user;

      const { data: appUser, error: appUserError } = await supabaseClient
        .from("app_users")
        .select("role")
        .eq("user_id", loggedInUser.id)
        .single();

      if (appUserError || !appUser) {
        alert("Could not load your role.");
        return;
      }

      if (appUser.role !== "admin") {
        alert("Access denied. Admin only.");
        window.location.href = "index.html";
        return;
      }

      const { data: teamsData, error: teamsError } = await supabaseClient
        .from("teams")
        .select("id, team_name");

      if (teamsError) {
        alert("Could not load teams.");
        console.log(teamsError);
        return;
      }

      const teamMap = {};
      teamsData.forEach((team) => {
        teamMap[team.id] = team.team_name;
      });

      const { data: usersData, error: usersError } = await supabaseClient
        .from("app_users")
        .select("email, team_id, role, status")
        .order("email", { ascending: true });

      if (usersError) {
        alert("Could not load users.");
        console.log(usersError);
        return;
      }

      const tableBody = document.getElementById("users-table-body");
      tableBody.innerHTML = "";

      usersData.forEach((user) => {
        const tr = document.createElement("tr");

        const teamName = teamMap[user.team_id] || "";

        tr.innerHTML = `
          <td>${user.email ?? ""}</td>
          <td>${teamName}</td>
          <td>${user.role ?? ""}</td>
          <td class="${user.status === 'inactive' ? 'status-inactive' : 'status-active'}">
            ${user.status ?? ""}
          </td>
        `;
        tr.onclick = function () {
  selectUserRow(user.email, tr);
};
        tableBody.appendChild(tr);
      });
    }

    loadUsersPage();
  </script>
</body>
</html>
