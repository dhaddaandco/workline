<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Users</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
      let selectedUserEmail = null;
let selectedUserData = null;
let selectedUserId = null;

    function resetUserForm() {
  document.getElementById("editing_user_id").value = "";
  document.getElementById("user_email").value = "";
  document.getElementById("user_team").value = "";
  document.getElementById("user_role").value = "member";
  document.getElementById("user_status").value = "active";

  document.getElementById("user-form-title").textContent = "Edit User";
}

    async function loadTeamsIntoUserDropdown() {
  const { data, error } = await supabaseClient
    .from("teams")
    .select("id, team_name")
    .order("team_name", { ascending: true });

  if (error) {
    console.log("Error loading teams:", error.message);
    return;
  }

  const teamSelect = document.getElementById("user_team");
  teamSelect.innerHTML = '<option value="">Select Team</option>';

  data.forEach((team) => {
    const option = document.createElement("option");
    option.value = team.id;
    option.textContent = team.team_name;
    teamSelect.appendChild(option);
  });
}

function openUserModalForEdit() {
  if (!selectedUserData) {
    alert("Please select a user first.");
    return;
  }

  document.getElementById("editing_user_id").value = selectedUserData.user_id || "";
  document.getElementById("user_email").value = selectedUserData.email || "";
  document.getElementById("user_team").value = selectedUserData.team_id || "";
  document.getElementById("user_role").value = selectedUserData.role || "member";
  document.getElementById("user_status").value = selectedUserData.status || "active";

  document.getElementById("user-form-title").textContent = "Edit User";
  document.getElementById("user-modal").style.display = "block";
}
function closeUserModal() {
  document.getElementById("user-modal").style.display = "none";
  resetUserForm();
}
function selectUserRow(user, rowElement) {
  selectedUserEmail = user.email;
  selectedUserId = user.user_id;
  selectedUserData = user;

  document.querySelectorAll("#users-table-body tr").forEach((tr) => {
    tr.classList.remove("selected-user-row");
  });

  rowElement.classList.add("selected-user-row");

  document.getElementById("edit-user-button").disabled = false;
}
  function saveUser() {
  const editingUserId = document.getElementById("editing_user_id").value;

  if (!editingUserId) {
    alert("Please select a user first.");
    return;
  }

  updateExistingUser(editingUserId);
}
 async function updateExistingUser(userId) {
  if (!userId) {
    alert("No user selected for editing.");
    return;
  }

  const { data: loggedInUserData, error: loggedInUserError } = await supabaseClient.auth.getUser();

  if (loggedInUserError || !loggedInUserData.user) {
    alert("You must be logged in.");
    return;
  }

  const loggedInUser = loggedInUserData.user;

  const { data: existingRow, error: fetchError } = await supabaseClient
    .from("app_users")
    .select("*")
    .eq("user_id", userId)
    .single();

  if (fetchError) {
    alert("Could not load existing user.");
    console.log(fetchError);
    return;
  }

  const updatedData = {
    email: document.getElementById("user_email").value,
    team_id: document.getElementById("user_team").value
      ? Number(document.getElementById("user_team").value)
      : null,
    role: document.getElementById("user_role").value,
    status: document.getElementById("user_status").value
  };

  const { data: updatedRows, error: updateError } = await supabaseClient
    .from("app_users")
    .update(updatedData)
    .eq("user_id", userId)
    .select();

  if (updateError) {
    alert("Update failed: " + updateError.message);
    console.log(updateError);
    return;
  }

  if (!updatedRows || updatedRows.length === 0) {
    alert("No row was updated.");
    return;
  }

  const updatedRow = updatedRows[0];

  const { error: logError } = await supabaseClient
  .from("audit_logs")
  .insert([
    {
      user_id: loggedInUser.id,
      user_email: updatedRow.email,
      action: "update",
      table_name: "app_users",
      row_id: updatedRow.id,
      old_data: existingRow,
      new_data: updatedRow
    }
  ]);
  if (logError) {
    console.log("Audit log update failed:", logError.message);
  }

  alert("User updated successfully");
  closeUserModal();

  selectedUserEmail = null;
  selectedUserId = null;
  selectedUserData = null;
  document.getElementById("edit-user-button").disabled = true;

  await loadUsersPage();
}
  </script>

  <style>
    #users-table-body tr {
  cursor: pointer;
}
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
    }

    .top-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      font-size: 14px;
    }

    th {
      background-color: #f4f4f4;
    }

    .status-active {
      color: green;
      font-weight: bold;
    }

    .status-inactive {
      color: #b42318;
      font-weight: bold;
    }
    .users-actions {
  display: flex;
  gap: 10px;
  margin-bottom: 15px;
}

.selected-user-row {
  background-color: #fff3cd;
}
    .modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  z-index: 1000;
  overflow-y: auto;
  padding: 20px 0;
}

.modal-content {
  background: white;
  width: 90%;
  max-width: 600px;
  margin: 40px auto;
  padding: 20px;
  border-radius: 8px;
  position: relative;
  box-sizing: border-box;
}

.close-button {
  position: absolute;
  top: 10px;
  right: 15px;
  font-size: 24px;
  cursor: pointer;
}

.user-form {
  display: grid;
  gap: 10px;
}

.user-form label {
  font-weight: bold;
  margin-top: 6px;
}

.user-form input,
.user-form select {
  padding: 10px;
  font-size: 14px;
}

.user-form-actions {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}
  </style>
</head>
<body>
  <div class="top-bar">
    <button onclick="window.location.href='index.html'">Back to Billing</button>
  </div>

  <h2>Users</h2>
  <div class="users-actions">
  <button type="button" id="edit-user-button" onclick="openUserModalForEdit()" disabled>Edit Selected</button>
</div>
<div id="user-modal" class="modal" style="display: none;">
  <div class="modal-content">
    <span class="close-button" onclick="closeUserModal()">&times;</span>

    <h3 id="user-form-title">Edit User</h3>

    <div class="user-form">
      <input type="hidden" id="editing_user_id" />
      <label>Email</label>
      <input type="email" id="user_email" placeholder="Email" />

      <label>Team</label>
      <select id="user_team"></select>

      <label>Role</label>
      <select id="user_role">
        <option value="member">member</option>
        <option value="partner">partner</option>
        <option value="admin">admin</option>
      </select>

      <label>Status</label>
      <select id="user_status">
        <option value="active">active</option>
        <option value="inactive">inactive</option>
      </select>

      <div class="user-form-actions">
        <button type="button" id="user-save-button" onclick="saveUser()">Save</button>
        <button type="button" onclick="closeUserModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>
  <table>
    <thead>
      <tr>
        <th>Email</th>
        <th>Team</th>
        <th>Role</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="users-table-body"></tbody>
  </table>

  <script>
    const supabaseUrl = "https://mgkucaagzcllxnecirbi.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1na3VjYWFnemNsbHhuZWNpcmJpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU3MjU1OTcsImV4cCI6MjA5MTMwMTU5N30.pzhesD0POzMnZSRrXFHp33mCh94GsdpQW2ieVeWca1g";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    async function loadUsersPage() {
      const { data: userData, error: userError } = await supabaseClient.auth.getUser();

      if (userError || !userData.user) {
        window.location.href = "login.html";
        return;
      }

      const loggedInUser = userData.user;

      const { data: appUser, error: appUserError } = await supabaseClient
        .from("app_users")
        .select("role")
        .eq("user_id", loggedInUser.id)
        .single();

      if (appUserError || !appUser) {
        alert("Could not load your role.");
        return;
      }

      if (appUser.role !== "admin") {
        alert("Access denied. Admin only.");
        window.location.href = "index.html";
        return;
      }

      const { data: teamsData, error: teamsError } = await supabaseClient
  .from("teams")
  .select("id, team_name");
      if (teamsError) {
        alert("Could not load teams.");
        console.log(teamsError);
        return;
      }

      const teamMap = {};
      teamsData.forEach((team) => {
        teamMap[team.id] = team.team_name;
      });

      const { data: usersData, error: usersError } = await supabaseClient
        .from("app_users")
        .select("user_id, email, team_id, role, status")
        .order("email", { ascending: true });

      if (usersError) {
        alert("Could not load users.");
        console.log(usersError);
        return;
      }

      const tableBody = document.getElementById("users-table-body");
      tableBody.innerHTML = "";

      usersData.forEach((user) => {
        const tr = document.createElement("tr");

        const teamName = teamMap[user.team_id] || "";

        tr.innerHTML = `
          <td>${user.email ?? ""}</td>
          <td>${teamName}</td>
          <td>${user.role ?? ""}</td>
          <td class="${user.status === 'inactive' ? 'status-inactive' : 'status-active'}">
            ${user.status ?? ""}
          </td>
        `;
        tr.onclick = function () {
  selectUserRow(user, tr);
};
        tableBody.appendChild(tr);
      });
    }

    async function initializeUsersPage() {
  await loadUsersPage();
  await loadTeamsIntoUserDropdown();
}

initializeUsersPage();
  </script>
</body>
</html>
